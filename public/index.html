<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Shortener API</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 40px;
      max-width: 600px;
    }
    h1 { font-size: 32px; margin-bottom: 16px; }
    p { color: #aaa; margin-bottom: 24px; }
    .endpoints {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 24px;
      text-align: left;
      margin-top: 24px;
    }
    .endpoint {
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .endpoint:last-child { border-bottom: none; }
    .method {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
      margin-right: 8px;
    }
    .get { background: #10b981; }
    .post { background: #3b82f6; }
    .delete { background: #ef4444; }
    .put { background: #f59e0b; }
    code { color: #fbbf24; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔗 Link Shortener API</h1>
    <p>Sistema de encurtamento de links com analytics</p>
    
    <div class="endpoints">
      <div class="endpoint">
        <span class="method post">POST</span>
        <code>/api/links</code>
        <br><small style="color:#888">Criar novo link</small>
      </div>
      <div class="endpoint">
        <span class="method get">GET</span>
        <code>/api/links</code>
        <br><small style="color:#888">Listar todos os links</small>
      </div>
      <div class="endpoint">
        <span class="method get">GET</span>
        <code>/api/link/{slug}</code>
        <br><small style="color:#888">Detalhes de um link</small>
      </div>
      <div class="endpoint">
        <span class="method put">PUT</span>
        <code>/api/link/{slug}</code>
        <br><small style="color:#888">Atualizar link</small>
      </div>
      <div class="endpoint">
        <span class="method delete">DELETE</span>
        <code>/api/link/{slug}</code>
        <br><small style="color:#888">Remover link</small>
      </div>
      <div class="endpoint">
        <span class="method get">GET</span>
        <code>/api/stats/{slug}</code>
        <br><small style="color:#888">Estatísticas do link</small>
      </div>
    </div>
  </div>
</body>
</html>
