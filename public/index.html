<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Link Shortener</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      min-height: 100vh;
      color: #fff;
    }
    
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .login-box {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-radius: 16px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
      border: 1px solid #2a2a4a;
      text-align: center;
    }
    
    .login-box h1 { font-size: 28px; margin-bottom: 8px; }
    .login-box p { color: #888; margin-bottom: 32px; }
    
    .login-box input {
      width: 100%;
      background: #0f0f1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 14px 16px;
      color: #fff;
      font-size: 16px;
      margin-bottom: 16px;
    }
    
    .login-box input:focus { outline: none; border-color: #3b82f6; }
    
    .login-box button {
      width: 100%;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .login-box button:hover { background: #2563eb; }
    
    .login-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      display: none;
    }
    
    .admin-panel { display: none; }
    
    .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
    
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      flex-wrap: wrap;
      gap: 16px;
    }
    
    h1 { font-size: 28px; display: flex; align-items: center; gap: 12px; }
    
    .header-right { display: flex; align-items: center; gap: 16px; }
    .user-info { font-size: 14px; color: #888; }
    
    .btn-logout {
      background: transparent;
      border: 1px solid #ef4444;
      color: #ef4444;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    
    .btn-logout:hover { background: #ef4444; color: #fff; }
    
    .domain-badge {
      background: #3b82f6;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    
    .stats-bar { display: flex; gap: 24px; }
    .stat { text-align: center; }
    .stat-value { font-size: 24px; font-weight: bold; color: #3b82f6; }
    .stat-label { font-size: 12px; color: #666; }
    
    .create-form {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 32px;
      border: 1px solid #2a2a4a;
    }
    
    .form-title { font-size: 18px; margin-bottom: 20px; color: #fff; }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 200px 200px auto;
      gap: 12px;
      align-items: end;
    }
    
    @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }
    
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    
    label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    input {
      background: #0f0f1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px 16px;
      color: #fff;
      font-size: 14px;
    }
    
    input:focus { outline: none; border-color: #3b82f6; }
    input::placeholder { color: #555; }
    
    button {
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    
    button:hover { background: #2563eb; }
    button:disabled { background: #333; cursor: not-allowed; }
    
    .links-section {
      background: #1a1a2e;
      border-radius: 16px;
      border: 1px solid #2a2a4a;
      overflow: hidden;
    }
    
    .section-header {
      padding: 20px 24px;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .section-title { font-size: 16px; font-weight: 600; }
    
    .refresh-btn {
      background: transparent;
      border: 1px solid #333;
      padding: 8px 16px;
      font-size: 12px;
    }
    
    .refresh-btn:hover { background: #2a2a4a; }
    
    .links-list { max-height: 500px; overflow-y: auto; }
    
    .link-item {
      display: grid;
      grid-template-columns: 1fr 2fr auto auto;
      gap: 16px;
      padding: 16px 24px;
      border-bottom: 1px solid #2a2a4a;
      align-items: center;
    }
    
    .link-item:hover { background: rgba(59, 130, 246, 0.05); }
    
    @media (max-width: 768px) { .link-item { grid-template-columns: 1fr; gap: 8px; } }
    
    .link-slug {
      font-weight: 600;
      color: #3b82f6;
      font-family: monospace;
      font-size: 14px;
      text-decoration: none;
    }
    
    .link-slug:hover { text-decoration: underline; }
    
    .link-destination {
      color: #888;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .link-clicks {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #10b981;
      font-size: 14px;
      font-weight: 500;
    }
    
    .link-actions { display: flex; gap: 8px; }
    
    .btn-small { padding: 6px 12px; font-size: 12px; border-radius: 6px; }
    .btn-copy { background: #10b981; }
    .btn-copy:hover { background: #059669; }
    .btn-delete { background: #ef4444; }
    .btn-delete:hover { background: #dc2626; }
    .btn-stats { background: #8b5cf6; }
    .btn-stats:hover { background: #7c3aed; }
    
    .empty-state { text-align: center; padding: 60px 20px; color: #666; }
    .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.5; }
    
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #10b981;
      color: #fff;
      padding: 16px 24px;
      border-radius: 8px;
      font-size: 14px;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
      z-index: 1000;
    }
    
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { background: #ef4444; }
    
    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .modal.show { display: flex; }
    
    .modal-content {
      background: #1a1a2e;
      border-radius: 16px;
      padding: 24px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .modal-close {
      background: transparent;
      border: none;
      color: #666;
      font-size: 24px;
      cursor: pointer;
      padding: 0;
    }
    
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    
    .stats-card {
      background: #0f0f1a;
      padding: 16px;
      border-radius: 8px;
      text-align: center;
    }
    
    .stats-card-value { font-size: 28px; font-weight: bold; color: #3b82f6; }
    .stats-card-label { font-size: 12px; color: #666; margin-top: 4px; }
    
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #333;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  
  <div class="login-screen" id="login-screen">
    <div class="login-box">
      <h1>🔗 Link Shortener</h1>
      <p>Faça login para acessar o painel</p>
      <div class="login-error" id="login-error"></div>
      <input type="email" id="login-email" placeholder="Seu email">
      <input type="password" id="login-password" placeholder="Senha">
      <button onclick="login()">Entrar</button>
    </div>
  </div>
  
  <div class="admin-panel" id="admin-panel">
    <div class="container">
      <header>
        <div>
          <h1>🔗 Link Shortener</h1>
          <span class="domain-badge" id="current-domain"></span>
        </div>
        <div class="header-right">
          <span class="user-info" id="user-email"></span>
          <button class="btn-logout" onclick="logout()">Sair</button>
        </div>
      </header>
      
      <div class="stats-bar" style="margin-bottom: 32px;">
        <div class="stat">
          <div class="stat-value" id="total-links">-</div>
          <div class="stat-label">Links</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="total-clicks">-</div>
          <div class="stat-label">Cliques</div>
        </div>
      </div>
      
      <div class="create-form">
        <h2 class="form-title">✨ Criar novo link</h2>
        <div class="form-row">
          <div class="form-group">
            <label>URL de destino *</label>
            <input type="url" id="input-url" placeholder="https://youtube.com/watch?v=..." required>
          </div>
          <div class="form-group">
            <label>Slug (opcional)</label>
            <input type="text" id="input-slug" placeholder="meu-link">
          </div>
          <div class="form-group">
            <label>Título (opcional)</label>
            <input type="text" id="input-title" placeholder="Aula 1">
          </div>
          <button id="btn-create" onclick="createLink()">Criar</button>
        </div>
      </div>
      
      <div class="links-section">
        <div class="section-header">
          <h3 class="section-title">📋 Links deste domínio</h3>
          <button class="refresh-btn" onclick="loadLinks()">↻ Atualizar</button>
        </div>
        <div class="links-list" id="links-list">
          <div class="empty-state">
            <div class="loading"></div>
            <p style="margin-top:16px">Carregando links...</p>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>
  
  <div class="modal" id="stats-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>📊 Estatísticas</h3>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div id="stats-content"></div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    const CURRENT_DOMAIN = window.location.host;
    
    const ALLOWED_EMAILS = [
      'nataliabs1983@gmail.com',
      'bineryefi@gmail.com',
      'ruanf195@gmail.com',
      'enilson.lenyn@gmail.com',
      'danielle.antunes@gmail.com'
    ];
    
    const PASSWORD = 'senha@12345';
    
    function checkSession() {
      const session = localStorage.getItem('linkadmin_session');
      if (session) {
        const { email, expires } = JSON.parse(session);
        if (Date.now() < expires && ALLOWED_EMAILS.includes(email.toLowerCase())) {
          showAdmin(email);
          return;
        }
        localStorage.removeItem('linkadmin_session');
      }
      showLogin();
    }
    
    function login() {
      const email = document.getElementById('login-email').value.trim().toLowerCase();
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');
      
      errorEl.style.display = 'none';
      
      if (!email || !password) {
        errorEl.textContent = 'Preencha email e senha';
        errorEl.style.display = 'block';
        return;
      }
      
      if (!ALLOWED_EMAILS.includes(email)) {
        errorEl.textContent = 'Email não autorizado';
        errorEl.style.display = 'block';
        return;
      }
      
      if (password !== PASSWORD) {
        errorEl.textContent = 'Senha incorreta';
        errorEl.style.display = 'block';
        return;
      }
      
      const session = {
        email: email,
        expires: Date.now() + (24 * 60 * 60 * 1000)
      };
      localStorage.setItem('linkadmin_session', JSON.stringify(session));
      
      showAdmin(email);
    }
    
    function logout() {
      localStorage.removeItem('linkadmin_session');
      showLogin();
    }
    
    function showLogin() {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('admin-panel').style.display = 'none';
    }
    
    function showAdmin(email) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      document.getElementById('user-email').textContent = email;
      document.getElementById('current-domain').textContent = CURRENT_DOMAIN;
      loadLinks();
    }
    
    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast show' + (isError ? ' error' : '');
      setTimeout(() => toast.className = 'toast', 3000);
    }
    
    async function loadLinks() {
      try {
        const res = await fetch(`${API_BASE}/api/links`);
        const data = await res.json();
        
        document.getElementById('total-links').textContent = data.total || 0;
        
        const totalClicks = (data.links || []).reduce((sum, link) => sum + (link.clicks || 0), 0);
        document.getElementById('total-clicks').textContent = totalClicks;
        
        const listEl = document.getElementById('links-list');
        
        if (!data.links || data.links.length === 0) {
          listEl.innerHTML = `
            <div class="empty-state">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
              </svg>
              <p>Nenhum link criado ainda</p>
              <p style="font-size:13px;margin-top:8px">Crie seu primeiro link acima!</p>
            </div>
          `;
          return;
        }
        
        listEl.innerHTML = data.links.map(link => `
          <div class="link-item">
            <div>
              <a href="${link.short_url}" target="_blank" class="link-slug">/${link.slug}</a>
              ${link.title ? `<div style="font-size:12px;color:#666;margin-top:4px">${link.title}</div>` : ''}
            </div>
            <div class="link-destination" title="${link.destination_url}">${link.destination_url}</div>
            <div class="link-clicks">
              <span>👆</span> ${link.clicks || 0} cliques
            </div>
            <div class="link-actions">
              <button class="btn-small btn-copy" onclick="copyLink('${link.short_url}')">Copiar</button>
              <button class="btn-small btn-stats" onclick="showStats('${link.slug}')">Stats</button>
              <button class="btn-small btn-delete" onclick="deleteLink('${link.slug}')">🗑️</button>
            </div>
          </div>
        `).join('');
        
      } catch (err) {
        console.error(err);
        showToast('Erro ao carregar links', true);
      }
    }
    
    async function createLink() {
      const url = document.getElementById('input-url').value.trim();
      const slug = document.getElementById('input-slug').value.trim();
      const title = document.getElementById('input-title').value.trim();
      
      if (!url) {
        showToast('URL é obrigatória', true);
        return;
      }
      
      const btn = document.getElementById('btn-create');
      btn.disabled = true;
      btn.textContent = 'Criando...';
      
      try {
        const res = await fetch(`${API_BASE}/api/links`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, slug: slug || undefined, title: title || undefined })
        });
        
        const data = await res.json();
        
        if (!res.ok) throw new Error(data.error || 'Erro ao criar');
        
        showToast(`Link criado: ${data.link.short_url}`);
        
        document.getElementById('input-url').value = '';
        document.getElementById('input-slug').value = '';
        document.getElementById('input-title').value = '';
        
        loadLinks();
        
      } catch (err) {
        showToast(err.message, true);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Criar';
      }
    }
    
    function copyLink(url) {
      navigator.clipboard.writeText(url);
      showToast('Link copiado!');
    }
    
    async function deleteLink(slug) {
      if (!confirm(`Tem certeza que quer deletar /${slug}?`)) return;
      
      try {
        const res = await fetch(`${API_BASE}/api/link/${slug}`, { method: 'DELETE' });
        if (!res.ok) throw new Error('Erro ao deletar');
        showToast('Link removido');
        loadLinks();
      } catch (err) {
        showToast('Erro ao deletar', true);
      }
    }
    
    async function showStats(slug) {
      const modal = document.getElementById('stats-modal');
      const content = document.getElementById('stats-content');
      
      content.innerHTML = '<div style="text-align:center;padding:40px"><div class="loading"></div></div>';
      modal.classList.add('show');
      
      try {
        const res = await fetch(`${API_BASE}/api/stats/${slug}?days=30`);
        const data = await res.json();
        const stats = data.stats;
        
        content.innerHTML = `
          <div style="margin-bottom:20px">
            <strong style="color:#3b82f6">/${data.link.slug}</strong>
            <div style="font-size:13px;color:#666;margin-top:4px">${data.link.destination_url}</div>
          </div>
          
          <div class="stats-grid">
            <div class="stats-card">
              <div class="stats-card-value">${stats.total_clicks}</div>
              <div class="stats-card-label">Cliques totais</div>
            </div>
            <div class="stats-card">
              <div class="stats-card-value">${stats.clicks_in_period}</div>
              <div class="stats-card-label">Últimos 30 dias</div>
            </div>
          </div>
          
          <div style="margin-top:20px">
            <h4 style="font-size:14px;margin-bottom:12px">📱 Por dispositivo</h4>
            ${Object.entries(stats.by_device).map(([device, count]) => `
              <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #333">
                <span>${device}</span>
                <span style="color:#3b82f6">${count}</span>
              </div>
            `).join('') || '<div style="color:#666;padding:8px 0">Sem dados</div>'}
          </div>
          
          <div style="margin-top:20px">
            <h4 style="font-size:14px;margin-bottom:12px">🌍 Por país</h4>
            ${Object.entries(stats.by_country).map(([country, count]) => `
              <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #333">
                <span>${country}</span>
                <span style="color:#3b82f6">${count}</span>
              </div>
            `).join('') || '<div style="color:#666;padding:8px 0">Sem dados</div>'}
          </div>
        `;
      } catch (err) {
        content.innerHTML = '<p style="color:#ef4444;text-align:center">Erro ao carregar estatísticas</p>';
      }
    }
    
    function closeModal() {
      document.getElementById('stats-modal').classList.remove('show');
    }
    
    document.getElementById('stats-modal').addEventListener('click', (e) => {
      if (e.target.id === 'stats-modal') closeModal();
    });
    
    document.getElementById('login-email').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('login-password').focus();
    });
    
    document.getElementById('login-password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });
    
    document.querySelectorAll('#admin-panel input').forEach(input => {
      input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') createLink();
      });
    });
    
    checkSession();
  </script>
</body>
</html>
